name: Rust CI

on:
  workflow_call:
    inputs:
      deny:
        description: "Run cargo deny check"
        type: boolean
        default: true
    secrets:
      REGISTRY_TOKEN:
        required: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_REGISTRIES_SHROUDB_CRATESIO_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
  CARGO_REGISTRIES_SHROUDB_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
  # Force cargo/rustup onto every step's PATH. The runner's systemd
  # .env does set this for the runner process, but the GITHUB_PATH
  # file-based mechanism was not reliably propagating to step shells.
  # Hardcoded to /home/nlucas because that's the runner user on gamed.
  PATH: /home/nlucas/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

jobs:
  ci:
    name: CI
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - name: Configure registry
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'EOF'
          [source.crates-io]
          replace-with = "shroudb-cratesio"
          [source.shroudb-cratesio]
          registry = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          [registries.shroudb-cratesio]
          index = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          credential-provider = ["cargo:token"]
          [registries.shroudb]
          index = "sparse+https://crates.shroudb.dev/api/v1/crates/"
          credential-provider = ["cargo:token"]
          EOF
      - name: Sanity
        run: |
          echo "user=$(id -un)  home=$HOME  pwd=$(pwd)"
          echo "PATH=$PATH"
          echo "--- /home/nlucas/.cargo/bin ---"
          ls -la /home/nlucas/.cargo/bin/ 2>&1 | head -20
          echo "--- resolve cargo ---"
          readlink -f /home/nlucas/.cargo/bin/cargo 2>&1 || true
          test -x /home/nlucas/.cargo/bin/cargo && echo "cargo is executable"
          test -x /home/nlucas/.cargo/bin/rustup && echo "rustup is executable"
          which cargo || echo "PATH search for cargo failed"
          /home/nlucas/.cargo/bin/cargo --version 2>&1 || echo "direct invocation failed: exit $?"
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  deny:
    name: Dependency Check
    if: ${{ inputs.deny }}
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - name: Configure registry
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'EOF'
          [source.crates-io]
          replace-with = "shroudb-cratesio"
          [source.shroudb-cratesio]
          registry = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          [registries.shroudb-cratesio]
          index = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          credential-provider = ["cargo:token"]
          [registries.shroudb]
          index = "sparse+https://crates.shroudb.dev/api/v1/crates/"
          credential-provider = ["cargo:token"]
          EOF
      - run: cargo deny check
