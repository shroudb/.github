name: Rust CI

on:
  workflow_call:
    inputs:
      deny:
        description: "Run cargo deny check"
        type: boolean
        default: true
    secrets:
      REGISTRY_TOKEN:
        required: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_REGISTRIES_SHROUDB_CRATESIO_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
  CARGO_REGISTRIES_SHROUDB_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
  # Workflow-level PATH so every step shell can find cargo/rustup. The
  # runner's systemd .env sets this process-wide but per-step shells were
  # not inheriting it reliably. Hardcoded to the /home/nlucas runner user.
  PATH: /home/nlucas/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  # Point cargo at the host's central target cache so repeated builds
  # across jobs share artifacts. Directory must exist and be writable
  # by the runner user (provisioned out-of-band on gamed).
  CARGO_TARGET_DIR: /opt/cargo-cache

jobs:
  ci:
    name: CI
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - name: Configure registry
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'EOF'
          [source.crates-io]
          replace-with = "shroudb-cratesio"
          [source.shroudb-cratesio]
          registry = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          [registries.shroudb-cratesio]
          index = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          credential-provider = ["cargo:token"]
          [registries.shroudb]
          index = "sparse+https://crates.shroudb.dev/api/v1/crates/"
          credential-provider = ["cargo:token"]
          EOF
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  deny:
    name: Dependency Check
    if: ${{ inputs.deny }}
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - name: Configure registry
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'EOF'
          [source.crates-io]
          replace-with = "shroudb-cratesio"
          [source.shroudb-cratesio]
          registry = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          [registries.shroudb-cratesio]
          index = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          credential-provider = ["cargo:token"]
          [registries.shroudb]
          index = "sparse+https://crates.shroudb.dev/api/v1/crates/"
          credential-provider = ["cargo:token"]
          EOF
      - run: cargo deny check
