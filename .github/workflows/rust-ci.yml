name: Rust CI

on:
  workflow_call:
    inputs:
      deny:
        description: "Run cargo deny check"
        type: boolean
        default: true
    secrets:
      REGISTRY_TOKEN:
        required: false
        description: "Token for private crate registry"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_HOME: /tmp/cargo-${{ github.run_id }}
  RUSTUP_HOME: /tmp/rustup-${{ github.run_id }}

jobs:
  fmt:
    name: Format
    runs-on: [self-hosted, railway]
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          export PATH="$CARGO_HOME/bin:$PATH"
          rustup component add rustfmt clippy
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"
      - name: Configure registry
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          mkdir -p "$CARGO_HOME"
          cat > "$CARGO_HOME/config.toml" << EOF
          [source.crates-io]
          replace-with = "shroudb-cratesio"

          [source.shroudb-cratesio]
          registry = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"

          [registries.shroudb-cratesio]
          index = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          credential-provider = ["cargo:token"]
          token = "${REGISTRY_TOKEN}"

          [registries.shroudb]
          index = "sparse+https://crates.shroudb.dev/api/v1/crates/"
          credential-provider = ["cargo:token"]
          token = "${REGISTRY_TOKEN}"
          EOF
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: [self-hosted, railway]
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          export PATH="$CARGO_HOME/bin:$PATH"
          rustup component add rustfmt clippy
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"
      - name: Configure registry
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          mkdir -p "$CARGO_HOME"
          cat > "$CARGO_HOME/config.toml" << EOF
          [source.crates-io]
          replace-with = "shroudb-cratesio"

          [source.shroudb-cratesio]
          registry = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"

          [registries.shroudb-cratesio]
          index = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          credential-provider = ["cargo:token"]
          token = "${REGISTRY_TOKEN}"

          [registries.shroudb]
          index = "sparse+https://crates.shroudb.dev/api/v1/crates/"
          credential-provider = ["cargo:token"]
          token = "${REGISTRY_TOKEN}"
          EOF
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: [self-hosted, railway]
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          export PATH="$CARGO_HOME/bin:$PATH"
          rustup component add rustfmt clippy
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"
      - name: Configure registry
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          mkdir -p "$CARGO_HOME"
          cat > "$CARGO_HOME/config.toml" << EOF
          [source.crates-io]
          replace-with = "shroudb-cratesio"

          [source.shroudb-cratesio]
          registry = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"

          [registries.shroudb-cratesio]
          index = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          credential-provider = ["cargo:token"]
          token = "${REGISTRY_TOKEN}"

          [registries.shroudb]
          index = "sparse+https://crates.shroudb.dev/api/v1/crates/"
          credential-provider = ["cargo:token"]
          token = "${REGISTRY_TOKEN}"
          EOF
      - run: cargo test --workspace -- --test-threads=4

  deny:
    name: Dependency Check
    if: ${{ inputs.deny }}
    runs-on: [self-hosted, railway]
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          export PATH="$CARGO_HOME/bin:$PATH"
          rustup component add rustfmt clippy
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"
      - name: Configure registry
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          mkdir -p "$CARGO_HOME"
          cat > "$CARGO_HOME/config.toml" << EOF
          [source.crates-io]
          replace-with = "shroudb-cratesio"

          [source.shroudb-cratesio]
          registry = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"

          [registries.shroudb-cratesio]
          index = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          credential-provider = ["cargo:token"]
          token = "${REGISTRY_TOKEN}"

          [registries.shroudb]
          index = "sparse+https://crates.shroudb.dev/api/v1/crates/"
          credential-provider = ["cargo:token"]
          token = "${REGISTRY_TOKEN}"
          EOF
      - run: cargo install cargo-deny --quiet || true
      - run: cargo deny check
