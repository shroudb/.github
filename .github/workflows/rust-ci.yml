name: Rust CI

on:
  workflow_call:
    inputs:
      deny:
        description: "Run cargo deny check"
        type: boolean
        default: true
    secrets:
      REGISTRY_TOKEN:
        required: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_REGISTRIES_SHROUDB_CRATESIO_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
  CARGO_REGISTRIES_SHROUDB_TOKEN: ${{ secrets.REGISTRY_TOKEN }}

# Runners are self-hosted; Rust + rustfmt/clippy/musl target + cargo-deny
# are pre-provisioned by .github/runner/setup.sh. Each job prepends
# ~/.cargo/bin to PATH so cargo/rustup resolve reliably from every step's
# shell, and writes ~/.cargo/config.toml so the private shroudb registry
# is reachable.

jobs:
  ci:
    name: CI
    runs-on: self-hosted
    steps:
      - name: Ensure cargo on PATH
        run: |
          echo "HOME='$HOME'  USER='$USER'  GITHUB_PATH='$GITHUB_PATH'"
          echo "Initial PATH: $PATH"
          ls -la /home/nlucas/.cargo/bin/cargo 2>&1 || echo "::warning::cargo binary missing at /home/nlucas/.cargo/bin/cargo"
          echo "/home/nlucas/.cargo/bin" >> "$GITHUB_PATH"
          echo "GITHUB_PATH file now contains:"
          cat "$GITHUB_PATH"
      - uses: actions/checkout@v5
      - name: Configure registry
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'EOF'
          [source.crates-io]
          replace-with = "shroudb-cratesio"
          [source.shroudb-cratesio]
          registry = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          [registries.shroudb-cratesio]
          index = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          credential-provider = ["cargo:token"]
          [registries.shroudb]
          index = "sparse+https://crates.shroudb.dev/api/v1/crates/"
          credential-provider = ["cargo:token"]
          EOF
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  deny:
    name: Dependency Check
    if: ${{ inputs.deny }}
    runs-on: self-hosted
    steps:
      - name: Ensure cargo on PATH
        run: |
          echo "HOME='$HOME'  USER='$USER'  GITHUB_PATH='$GITHUB_PATH'"
          echo "Initial PATH: $PATH"
          ls -la /home/nlucas/.cargo/bin/cargo 2>&1 || echo "::warning::cargo binary missing at /home/nlucas/.cargo/bin/cargo"
          echo "/home/nlucas/.cargo/bin" >> "$GITHUB_PATH"
          echo "GITHUB_PATH file now contains:"
          cat "$GITHUB_PATH"
      - uses: actions/checkout@v5
      - name: Configure registry
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'EOF'
          [source.crates-io]
          replace-with = "shroudb-cratesio"
          [source.shroudb-cratesio]
          registry = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          [registries.shroudb-cratesio]
          index = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          credential-provider = ["cargo:token"]
          [registries.shroudb]
          index = "sparse+https://crates.shroudb.dev/api/v1/crates/"
          credential-provider = ["cargo:token"]
          EOF
      - run: cargo deny check
