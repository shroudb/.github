name: Rust CI

on:
  workflow_call:
    inputs:
      deny:
        description: "Run cargo deny check"
        type: boolean
        default: true
    secrets:
      REGISTRY_TOKEN:
        required: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_REGISTRIES_SHROUDB_CRATESIO_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
  CARGO_REGISTRIES_SHROUDB_TOKEN: ${{ secrets.REGISTRY_TOKEN }}

jobs:
  fmt:
    name: Format
    runs-on: [self-hosted, railway]
    steps:
      - uses: actions/checkout@v5
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: [self-hosted, railway]
    steps:
      - uses: actions/checkout@v5
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: [self-hosted, railway]
    steps:
      - uses: actions/checkout@v5
      - run: cargo test --workspace -- --test-threads=1

  deny:
    name: Dependency Check
    if: ${{ inputs.deny }}
    runs-on: [self-hosted, railway]
    steps:
      - uses: actions/checkout@v5
      - run: cargo deny check
