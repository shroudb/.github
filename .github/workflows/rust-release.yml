name: Rust Release

on:
  workflow_call:
    inputs:
      product:
        type: string
        required: true
      server_package:
        type: string
        required: true
      server_binary:
        type: string
        required: true
      cli_package:
        type: string
        required: false
        default: ""
      cli_binary:
        type: string
        required: false
        default: ""
      docker_server_target:
        type: string
        required: true
      docker_cli_target:
        type: string
        required: false
        default: ""
      crates:
        type: string
        required: true
    secrets:
      REGISTRY_TOKEN:
        required: true
      GH_PAT:
        required: false
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_REGISTRIES_SHROUDB_CRATESIO_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
  CARGO_REGISTRIES_SHROUDB_TOKEN: ${{ secrets.REGISTRY_TOKEN }}

jobs:
  # ─── Step 1: Checks must pass ───
  check:
    name: Check
    runs-on: [self-hosted, railway]
    steps:
      - uses: actions/checkout@v5
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace -- --test-threads=1
      - run: cargo deny check || true

  # ─── Step 2: Publish crates ───
  publish:
    name: Publish crates
    needs: [check]
    runs-on: [self-hosted, railway]
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Publish
        run: |
          IFS=',' read -ra CRATES <<< "${{ inputs.crates }}"
          for crate in "${CRATES[@]}"; do
            crate=$(echo "$crate" | xargs)
            echo "Publishing $crate..."
            cargo publish -p "$crate" --registry shroudb --allow-dirty 2>&1 || echo "  (already published or failed, continuing)"
            sleep 5
          done

  # ─── Step 3: Build binaries (self-hosted, Linux targets) ───
  build:
    name: Build (${{ matrix.target }})
    needs: [check]
    runs-on: [self-hosted, railway]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            use_cross: false
          - target: aarch64-unknown-linux-musl
            use_cross: true
    steps:
      - uses: actions/checkout@v5
      - name: Install target
        run: rustup target add ${{ matrix.target }}
      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --quiet 2>/dev/null || true
      - name: Build
        run: |
          PACKAGES="-p ${{ inputs.server_package }}"
          [ -n "${{ inputs.cli_package }}" ] && PACKAGES="$PACKAGES -p ${{ inputs.cli_package }}"
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} $PACKAGES
          else
            cargo build --release --target ${{ matrix.target }} $PACKAGES
          fi
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ inputs.server_binary }}" dist/
          BINARIES="${{ inputs.server_binary }}"
          if [ -n "${{ inputs.cli_binary }}" ]; then
            cp "target/${{ matrix.target }}/release/${{ inputs.cli_binary }}" dist/ 2>/dev/null || true
            [ -f "dist/${{ inputs.cli_binary }}" ] && BINARIES="$BINARIES ${{ inputs.cli_binary }}"
          fi
          cd dist
          tar czf "shroudb-${{ inputs.product }}-v${VERSION}-${{ matrix.target }}.tar.gz" $BINARIES
          rm -f $BINARIES
      - uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.target }}
          path: dist/*.tar.gz

  # ─── Step 4: Docker ───
  docker:
    name: Docker
    if: "!contains(github.ref, '-rc')"
    needs: [check]
    runs-on: [self-hosted, railway]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Build and push
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin 2>/dev/null || true

          # Build server image
          docker build \
            --target "${{ inputs.docker_server_target }}" \
            --tag "shroudb/${{ inputs.product }}:${{ github.ref_name }}" \
            --tag "shroudb/${{ inputs.product }}:latest" \
            --tag "ghcr.io/shroudb/${{ inputs.product }}:${{ github.ref_name }}" \
            --tag "ghcr.io/shroudb/${{ inputs.product }}:latest" \
            .
          docker push "shroudb/${{ inputs.product }}:${{ github.ref_name }}"
          docker push "shroudb/${{ inputs.product }}:latest"
          docker push "ghcr.io/shroudb/${{ inputs.product }}:${{ github.ref_name }}"
          docker push "ghcr.io/shroudb/${{ inputs.product }}:latest"

          # Build CLI image (if applicable)
          if [ -n "${{ inputs.docker_cli_target }}" ]; then
            docker build \
              --target "${{ inputs.docker_cli_target }}" \
              --tag "shroudb/${{ inputs.product }}-cli:${{ github.ref_name }}" \
              --tag "shroudb/${{ inputs.product }}-cli:latest" \
              --tag "ghcr.io/shroudb/${{ inputs.product }}-cli:${{ github.ref_name }}" \
              --tag "ghcr.io/shroudb/${{ inputs.product }}-cli:latest" \
              .
            docker push "shroudb/${{ inputs.product }}-cli:${{ github.ref_name }}"
            docker push "shroudb/${{ inputs.product }}-cli:latest"
            docker push "ghcr.io/shroudb/${{ inputs.product }}-cli:${{ github.ref_name }}"
            docker push "ghcr.io/shroudb/${{ inputs.product }}-cli:latest"
          fi

  # ─── Step 5: GitHub Release ───
  github-release:
    name: GitHub Release
    if: "!contains(github.ref, '-rc')"
    needs: [build]
    runs-on: [self-hosted, railway]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" artifacts/*.tar.gz \
            --repo "${{ github.repository }}" \
            --generate-notes

  # ─── Step 6: Homebrew ───
  homebrew:
    name: Update Homebrew
    if: "!contains(github.ref, '-rc')"
    needs: [github-release]
    runs-on: [self-hosted, railway]
    steps:
      - name: Trigger formula update
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh api repos/shroudb/homebrew-tap/dispatches \
            -f event_type=formula-update \
            -f "client_payload[formula]=shroudb-${{ inputs.product }}" \
            -f "client_payload[version]=$VERSION"

  # ─── Step 7: Codegen ───
  codegen:
    name: Trigger SDK codegen
    if: "!contains(github.ref, '-rc')"
    needs: [publish]
    runs-on: [self-hosted, railway]
    steps:
      - name: Dispatch codegen
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh api repos/shroudb/shroudb-codegen/dispatches \
            -f event_type=engine-release \
            -f "client_payload[engine]=${{ inputs.product }}" \
            -f "client_payload[version]=$VERSION" \
            -f "client_payload[spec_repo]=${{ github.repository }}"
