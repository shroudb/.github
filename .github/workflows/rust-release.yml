name: Rust Release

on:
  workflow_call:
    inputs:
      product:
        type: string
        required: true
      server_package:
        type: string
        required: true
      server_binary:
        type: string
        required: true
      cli_package:
        type: string
        required: false
        default: ""
      cli_binary:
        type: string
        required: false
        default: ""
      docker_server_target:
        type: string
        required: true
      docker_cli_target:
        type: string
        required: false
        default: ""
      crates:
        type: string
        required: true
    secrets:
      REGISTRY_TOKEN:
        required: true
      GH_PAT:
        required: false
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_HOME: /tmp/cargo-${{ github.run_id }}
  RUSTUP_HOME: /tmp/rustup-${{ github.run_id }}

jobs:
  # ─── Step 1: Checks must pass before anything else ───
  check:
    name: Check
    runs-on: [self-hosted, railway]
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          export PATH="$CARGO_HOME/bin:$PATH"
          rustup component add rustfmt clippy
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"
      - name: Configure registry
        run: |
          mkdir -p "$CARGO_HOME"
          cat > "$CARGO_HOME/config.toml" << EOF
          [source.crates-io]
          replace-with = "shroudb-cratesio"

          [source.shroudb-cratesio]
          registry = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"

          [registries.shroudb-cratesio]
          index = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          credential-provider = ["cargo:token"]
          token = "${{ secrets.REGISTRY_TOKEN }}"

          [registries.shroudb]
          index = "sparse+https://crates.shroudb.dev/api/v1/crates/"
          credential-provider = ["cargo:token"]
          token = "${{ secrets.REGISTRY_TOKEN }}"
          EOF
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace -- --test-threads=4
      - run: cargo install cargo-deny --quiet || true
      - run: cargo deny check || true

  # ─── Step 2: Publish crates (only after checks pass) ───
  publish:
    name: Publish crates
    needs: [check]
    runs-on: [self-hosted, railway]
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"
      - name: Configure registry
        run: |
          mkdir -p "$CARGO_HOME"
          cat > "$CARGO_HOME/config.toml" << EOF
          [source.crates-io]
          replace-with = "shroudb-cratesio"

          [source.shroudb-cratesio]
          registry = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"

          [registries.shroudb-cratesio]
          index = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          credential-provider = ["cargo:token"]
          token = "${{ secrets.REGISTRY_TOKEN }}"

          [registries.shroudb]
          index = "sparse+https://crates.shroudb.dev/api/v1/crates/"
          credential-provider = ["cargo:token"]
          token = "${{ secrets.REGISTRY_TOKEN }}"
          EOF
      - name: Publish
        run: |
          IFS=',' read -ra CRATES <<< "${{ inputs.crates }}"
          for crate in "${CRATES[@]}"; do
            crate=$(echo "$crate" | xargs)
            echo "Publishing $crate..."
            cargo publish -p "$crate" --registry shroudb --allow-dirty 2>&1
            sleep 5
          done

  # ─── Step 3: Build binaries (only after checks pass) ───
  build:
    name: Build (${{ matrix.target }})
    needs: [check]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: rustup target add ${{ matrix.target }}
      - name: Configure registry
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << EOF
          [source.crates-io]
          replace-with = "shroudb-cratesio"

          [source.shroudb-cratesio]
          registry = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"

          [registries.shroudb-cratesio]
          index = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          credential-provider = ["cargo:token"]
          token = "${{ secrets.REGISTRY_TOKEN }}"

          [registries.shroudb]
          index = "sparse+https://crates.shroudb.dev/api/v1/crates/"
          credential-provider = ["cargo:token"]
          token = "${{ secrets.REGISTRY_TOKEN }}"
          EOF
      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Install cross (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: curl -fsSL https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz | sudo tar xz -C /usr/local/bin
      - name: Build (cargo)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: |
          PACKAGES="-p ${{ inputs.server_package }}"
          [ -n "${{ inputs.cli_package }}" ] && PACKAGES="$PACKAGES -p ${{ inputs.cli_package }}"
          cargo build --release --target ${{ matrix.target }} $PACKAGES
      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          PACKAGES="-p ${{ inputs.server_package }}"
          [ -n "${{ inputs.cli_package }}" ] && PACKAGES="$PACKAGES -p ${{ inputs.cli_package }}"
          cross build --release --target ${{ matrix.target }} $PACKAGES
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ inputs.server_binary }}" dist/
          BINARIES="${{ inputs.server_binary }}"
          if [ -n "${{ inputs.cli_binary }}" ]; then
            cp "target/${{ matrix.target }}/release/${{ inputs.cli_binary }}" dist/ 2>/dev/null || true
            [ -f "dist/${{ inputs.cli_binary }}" ] && BINARIES="$BINARIES ${{ inputs.cli_binary }}"
          fi
          cd dist
          tar czf "shroudb-${{ inputs.product }}-v${VERSION}-${{ matrix.target }}.tar.gz" $BINARIES
          rm -f $BINARIES
      - uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.target }}
          path: dist/*.tar.gz

  # ─── Step 4: Docker (only after checks pass) ───
  docker:
    name: Docker
    if: "!contains(github.ref, '-rc')"
    needs: [check]
    runs-on: [self-hosted, railway]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Build and push
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin 2>/dev/null || true
          docker buildx create --use --name multiarch --driver docker-container 2>/dev/null || docker buildx use multiarch
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --target "${{ inputs.docker_server_target }}" \
            --tag "shroudb/${{ inputs.product }}:${{ github.ref_name }}" \
            --tag "shroudb/${{ inputs.product }}:latest" \
            --tag "ghcr.io/shroudb/${{ inputs.product }}:${{ github.ref_name }}" \
            --tag "ghcr.io/shroudb/${{ inputs.product }}:latest" \
            --push .
          if [ -n "${{ inputs.docker_cli_target }}" ]; then
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --target "${{ inputs.docker_cli_target }}" \
              --tag "shroudb/${{ inputs.product }}-cli:${{ github.ref_name }}" \
              --tag "shroudb/${{ inputs.product }}-cli:latest" \
              --tag "ghcr.io/shroudb/${{ inputs.product }}-cli:${{ github.ref_name }}" \
              --tag "ghcr.io/shroudb/${{ inputs.product }}-cli:latest" \
              --push .
          fi

  # ─── Step 5: GitHub Release (only after build completes) ───
  github-release:
    name: GitHub Release
    if: "!contains(github.ref, '-rc')"
    needs: [build]
    runs-on: [self-hosted, railway]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" artifacts/*.tar.gz \
            --repo "${{ github.repository }}" \
            --generate-notes

  # ─── Step 6: Homebrew (only after GitHub release) ───
  homebrew:
    name: Update Homebrew
    if: "!contains(github.ref, '-rc')"
    needs: [github-release]
    runs-on: [self-hosted, railway]
    steps:
      - name: Trigger formula update
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh api repos/shroudb/homebrew-tap/dispatches \
            -f event_type=formula-update \
            -f "client_payload[formula]=shroudb-${{ inputs.product }}" \
            -f "client_payload[version]=$VERSION"

  # ─── Step 7: Codegen (only after publish completes) ───
  codegen:
    name: Trigger SDK codegen
    if: "!contains(github.ref, '-rc')"
    needs: [publish]
    runs-on: [self-hosted, railway]
    steps:
      - name: Dispatch codegen
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh api repos/shroudb/shroudb-codegen/dispatches \
            -f event_type=engine-release \
            -f "client_payload[engine]=${{ inputs.product }}" \
            -f "client_payload[version]=$VERSION" \
            -f "client_payload[spec_repo]=${{ github.repository }}"
