name: Rust Release

on:
  workflow_call:
    inputs:
      product:
        type: string
        required: true
      server_package:
        type: string
        required: true
      server_binary:
        type: string
        required: true
      cli_package:
        type: string
        required: false
        default: ""
      cli_binary:
        type: string
        required: false
        default: ""
      docker_server_target:
        type: string
        required: true
      docker_cli_target:
        type: string
        required: false
        default: ""
      crates:
        type: string
        required: true
    secrets:
      REGISTRY_TOKEN:
        required: true
      GH_PAT:
        required: false
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_REGISTRIES_SHROUDB_CRATESIO_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
  CARGO_REGISTRIES_SHROUDB_TOKEN: ${{ secrets.REGISTRY_TOKEN }}

jobs:
  # ─── Step 1: Publish crates ───
  publish:
    name: Publish crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Configure registry
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'EOF'
          [source.crates-io]
          replace-with = "shroudb-cratesio"
          [source.shroudb-cratesio]
          registry = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          [registries.shroudb-cratesio]
          index = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          credential-provider = ["cargo:token"]
          [registries.shroudb]
          index = "sparse+https://crates.shroudb.dev/api/v1/crates/"
          credential-provider = ["cargo:token"]
          EOF
      - uses: Swatinem/rust-cache@v2
      - name: Publish
        run: |
          IFS=',' read -ra CRATES <<< "${{ inputs.crates }}"
          for crate in "${CRATES[@]}"; do
            crate=$(echo "$crate" | xargs)
            echo "Publishing $crate..."
            cargo publish -p "$crate" --registry shroudb --allow-dirty 2>&1 || echo "  (already published or failed, continuing)"
            sleep 5
          done

  # ─── Step 2: Build binaries ───
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            use_cross: false
          - target: aarch64-unknown-linux-musl
            use_cross: true
    steps:
      - uses: actions/checkout@v5
      - name: Configure registry
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'EOF'
          [source.crates-io]
          replace-with = "shroudb-cratesio"
          [source.shroudb-cratesio]
          registry = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          [registries.shroudb-cratesio]
          index = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          credential-provider = ["cargo:token"]
          [registries.shroudb]
          index = "sparse+https://crates.shroudb.dev/api/v1/crates/"
          credential-provider = ["cargo:token"]
          EOF
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-${{ matrix.target }}"
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Install target
        run: rustup target add ${{ matrix.target }}
      - name: Build
        run: |
          PACKAGES="-p ${{ inputs.server_package }}"
          [ -n "${{ inputs.cli_package }}" ] && PACKAGES="$PACKAGES -p ${{ inputs.cli_package }}"
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cargo install cross --quiet
            cross build --release --target ${{ matrix.target }} $PACKAGES
          else
            cargo build --release --target ${{ matrix.target }} $PACKAGES
          fi
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ inputs.server_binary }}" dist/
          BINARIES="${{ inputs.server_binary }}"
          if [ -n "${{ inputs.cli_binary }}" ]; then
            cp "target/${{ matrix.target }}/release/${{ inputs.cli_binary }}" dist/ 2>/dev/null || true
            [ -f "dist/${{ inputs.cli_binary }}" ] && BINARIES="$BINARIES ${{ inputs.cli_binary }}"
          fi
          cd dist
          tar czf "shroudb-${{ inputs.product }}-v${VERSION}-${{ matrix.target }}.tar.gz" $BINARIES
          rm -f $BINARIES
      - uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.target }}
          path: dist/*.tar.gz

  # ─── Step 3: Docker ───
  docker:
    name: Docker
    if: "!contains(github.ref, '-rc')"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Set up Docker Buildx
        run: docker buildx create --use --name multiarch --driver docker-container
      - name: Build and push
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --secret id=registry_token,env=REGISTRY_TOKEN \
            --provenance=true \
            --sbom=true \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --target "${{ inputs.docker_server_target }}" \
            --tag "shroudb/${{ inputs.product }}:${{ github.ref_name }}" \
            --tag "shroudb/${{ inputs.product }}:latest" \
            --push .

          if [ -n "${{ inputs.docker_cli_target }}" ]; then
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --secret id=registry_token,env=REGISTRY_TOKEN \
              --provenance=true \
              --sbom=true \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              --target "${{ inputs.docker_cli_target }}" \
              --tag "shroudb/${{ inputs.product }}-cli:${{ github.ref_name }}" \
              --tag "shroudb/${{ inputs.product }}-cli:latest" \
              --push .
          fi

  # ─── Step 4: GitHub Release ───
  github-release:
    name: GitHub Release
    if: "!contains(github.ref, '-rc')"
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" artifacts/*.tar.gz \
            --repo "${{ github.repository }}" \
            --generate-notes

  # ─── Step 5: Homebrew ───
  homebrew:
    name: Update Homebrew
    if: "!contains(github.ref, '-rc')"
    needs: [github-release]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger formula update
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh api repos/shroudb/homebrew-tap/dispatches \
            -f event_type=formula-update \
            -f "client_payload[formula]=shroudb-${{ inputs.product }}" \
            -f "client_payload[version]=$VERSION"

  # ─── Step 6: Codegen ───
  codegen:
    name: Trigger SDK codegen
    if: "!contains(github.ref, '-rc')"
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch codegen
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh api repos/shroudb/shroudb-codegen/dispatches \
            -f event_type=engine-release \
            -f "client_payload[engine]=${{ inputs.product }}" \
            -f "client_payload[version]=$VERSION" \
            -f "client_payload[spec_repo]=${{ github.repository }}"
